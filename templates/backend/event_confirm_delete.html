{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card border-danger shadow-sm">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">Conferma Eliminazione</h4>
            </div>
            <div class="card-body text-center p-4">
                <h5 class="card-title">Sei sicuro di voler eliminare "{{ object.title }}"?</h5>
                <p class="text-muted">Questa operazione eliminerà anche tutte le prenotazioni collegate. L'azione è irreversibile.</p>
                
                <form method="post" class="mt-4">
                    {% csrf_token %}
                    <a href="{% url 'backend:event_detail' object.id %}" class="btn btn-secondary">Annulla</a>
                    <button type="submit" class="btn btn-danger">Conferma Eliminazione</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
